<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Registration Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.container{
    width:950px;
    background:#111;
    border:2px solid #00ffff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px #00ffff;
}

.banner{
    position:relative;
}

.banner img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.banner h1{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:45px;
    text-shadow:0 0 20px #00ffff;
}

.form-section{
    padding:35px;
}

label{
    color:white;
    font-size:18px;
    font-weight:bold;
}

input,textarea{
    width:100%;
    padding:15px;
    margin:10px 0 20px;
    background:#000;
    color:white;
    border:2px solid #00ffff;
    border-radius:10px;
    font-size:16px;
    transition:.4s;
}

input:hover,
textarea:hover,
input:focus,
textarea:focus{
    border-color:#39ff14;
    box-shadow:0 0 20px #39ff14;
    transform:scale(1.02);
    outline:none;
}

.buttons{
    text-align:center;
    margin-top:20px;
}

button{
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:40px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.4s;
}

.register{
    background:#00ffff;
    color:black;
}

.reset{
    background:#ff004c;
    color:white;
}

.more{
    background:#39ff14;
    color:black;
}

button:hover{
    transform:translateY(-6px) scale(1.08);
    box-shadow:0 0 25px currentColor;
}

.about{
    background:#0b0b0b;
    padding:40px;
}

.about h2{
    color:#39ff14;
    text-align:center;
    margin-bottom:30px;
    text-shadow:0 0 15px #39ff14;
}

.cards{
    display:flex;
    justify-content:space-around;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    width:260px;
    background:#111;
    border:2px solid #00ffff;
    border-radius:15px;
    overflow:hidden;
    transition:.4s;
    box-shadow:0 0 15px #00ffff;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 25px #39ff14;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card p{
    color:white;
    padding:15px;
    text-align:center;
}

.footer{
    background:black;
    color:#00ffff;
    text-align:center;
    padding:18px;
    font-size:18px;
    border-top:2px solid #00ffff;
    text-shadow:0 0 10px #00ffff;
}
</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1400&q=80" alt="Banner">
<h1>Registration Form</h1>
</div>

<div class="form-section">

<form id="regForm">

<label>Full Name</label>
<input type="text" id="name" value="Utkarsh Kene">

<label>Address</label>
<textarea id="address" rows="3">SB Jain, Nagpur</textarea>

<label>Email</label>
<input type="email" id="email" value="hulululu@gmail.com">

<label>Phone Number</label>
<input type="tel" id="phone" value="00002220202">

<div class="buttons">

<button class="register" type="submit">Register</button>

<button class="reset" type="button" onclick="resetForm()">Reset</button>

<button class="more" type="button"
onclick="document.getElementById('about').scrollIntoView({behavior:'smooth'})">
Know More
</button>

</div>

</form>

</div>

<div class="about" id="about">

<h2>About Registration</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80" alt="">
<p>Fast and secure registration with a modern neon interface.</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=600&q=80" alt="">
<p>Responsive design with glowing hover effects and smooth animations.</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=600&q=80" alt="">
<p>Perfect for college projects and web development assignments.</p>
</div>

</div>

</div>

<div class="footer">
💙 Designed by <b>Utkarsh Kene</b>
</div>

</div>

<script>
function resetForm() {
    document.getElementById("name").value = "";
    document.getElementById("address").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
}
</script>

</body>
</html>
